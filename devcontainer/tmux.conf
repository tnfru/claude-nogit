# Ctrl-Q to detach (matches autobox TUI keybinding)
set -g prefix None
bind-key -n C-q detach-client

# Scrollback
set -g history-limit 50000

# Mouse scroll enters copy mode
set -g mouse on

# No chrome
set -g status off

# No ESC delay (critical for Claude's TUI responsiveness)
set -sg escape-time 0

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
